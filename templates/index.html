<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Llama Server Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <style>
      [v-cloak] { display: none; }
    </style>
  </head>
  <body>
    <div id="app" v-cloak>
      <main class="layout-two">
        <section class="panel list-panel">
          <div class="list-header">
            <h1>实例列表</h1>
            <div class="header-actions">
              <button id="addInstanceBtn" type="button" class="primary" @click="openForm(null)">添加实例</button>
              <button id="refreshBtn" type="button" @click="refreshInstances">刷新</button>
            </div>
          </div>
          
          <daemon-panel 
            :status="daemonStatus" 
            @toggle="toggleDaemon"
            :loading="daemonLoading"
          ></daemon-panel>
          
          <instance-list
            :instances="instances"
            :selected-id="selectedInstanceId"
            :loading-ids="loadingIds"
            @select="selectInstance"
            @edit="openForm"
            @toggle="toggleInstance"
            @copy="copyInstance"
            @delete="deleteInstance"
          ></instance-list>
          
          <footer class="site-footer">&copy; 2024 leaves615 — <a href="https://github.com/leaves615/llama-web-manager" target="_blank" rel="noopener noreferrer">GitHub</a></footer>
        </section>

        <section class="panel log-panel">
          <div class="list-header">
            <h2>日志查看</h2>
            <div class="log-head-actions">
              <span id="currentInstance">{{ currentInstanceName }}</span>
              <button id="enlargeLogBtn" type="button" class="enlarge-btn" title="放大查看" @click="showLogLarge = true">⛶</button>
            </div>
          </div>
          <log-viewer
            :logs="currentLogs"
            :loading="logLoading"
            @loadMore="loadMoreLogs"
          ></log-viewer>
        </section>
      </main>

      <div v-if="showForm" class="form-modal">
        <instance-form
          :instance="editingInstance"
          :loading="formLoading"
          @save="saveForm"
          @close="showForm = false"
        ></instance-form>
      </div>

      <confirm-modal
        v-if="showConfirm"
        :title="confirmData.title"
        :message="confirmData.message"
        :is-danger="confirmData.isDanger"
        confirm-text="删除"
        cancel-text="取消"
        @confirm="onConfirm"
        @cancel="onCancel"
      ></confirm-modal>

      <log-modal
        v-if="showLogLarge"
        :logs="currentLogs"
        :loading="logLoading"
        @loadMore="loadMoreLogs"
        @close="showLogLarge = false"
      ></log-modal>
    </div>

    <script src="{{ url_for('static', filename='main.js') }}"></script>
  </body>
</html>
