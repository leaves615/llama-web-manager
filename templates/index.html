<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Llama Server Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <style>
      [v-cloak] { display: none; }
    </style>
  </head>
  <body>
    <div id="app" v-cloak>
      <main class="layout-two">
        <section class="panel list-panel">
          <div class="list-header">
            <h1>实例列表</h1>
            <div class="header-actions">
              <button id="addInstanceBtn" type="button" class="primary" @click="openForm(null)">添加实例</button>
              <button id="refreshBtn" type="button" @click="refreshInstances">刷新</button>
            </div>
          </div>
          
          <daemon-panel 
            :status="daemonStatus" 
            @toggle="toggleDaemon"
            :loading="daemonLoading"
          ></daemon-panel>
          
          <instance-list
            :instances="instances"
            :selected-id="selectedInstanceId"
            :loading-ids="loadingIds"
            @select="selectInstance"
            @edit="openForm"
            @toggle="toggleInstance"
          ></instance-list>
          
          <footer class="site-footer">&copy; 2024 leaves615</footer>
        </section>

        <section class="panel log-panel">
          <div class="list-header">
            <h2>日志查看</h2>
            <div class="log-head-actions">
              <span id="currentInstance">{{ currentInstanceName }}</span>
              <button id="enlargeLogBtn" type="button" title="放大查看" @click="showLogLarge = true">⛶</button>
            </div>
          </div>
          <log-viewer
            :logs="currentLogs"
            :loading="logLoading"
          ></log-viewer>
        </section>
      </main>

      <instance-form
        v-if="showForm"
        :instance="editingInstance"
        :loading="formLoading"
        @save="saveForm"
        @close="showForm = false"
      ></instance-form>

      <log-modal
        v-if="showLogLarge"
        :logs="currentLogs"
        @close="showLogLarge = false"
      ></log-modal>
    </div>

    <script src="{{ url_for('static', filename='main.js') }}"></script>
  </body>
</html>
